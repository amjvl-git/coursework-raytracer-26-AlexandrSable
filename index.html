<!DOCTYPE html>
<html>

<head>
    <title>RayTracingwhooohu</title>
</head>

<body>
    <div class="app">
        <aside class="panel panel-left">
            <h2>Controls</h2>

            <div class="control-group">
                <label for="pathTracingToggle">
                    <input type="checkbox" id="pathTracingToggle"> Enable Path Tracing
                </label>
            </div>

            <div class="control-group">
                <label for="bouncesSlider">Max Bounces: <span id="bouncesValue">10</span></label>
                <input type="range" min="1" max="20" value="10" id="bouncesSlider">
            </div>

            <div class="control-group">
                <label for="sceneSelect">Scene:</label>
                <select id="sceneSelect">
                    <option value="simple" selected>Simple Scene</option>
                    <option value="cornell">Cornell Box</option>
                </select>
            </div>

            <div class="control-group">
                <label for="resolutionSelect">Resolution:</label>
                <select id="resolutionSelect">
                    <option value="256x256">256 x 256</option>
                    <option value="512x512" selected>512 x 512</option>
                    <option value="768x768">768 x 768</option>
                    <option value="1024x1024">1024 x 1024</option>
                </select>
            </div>

            <div class="control-group">
                <label for="myRange">Value: <span id="demo"></span></label>
                <input type="range" min="1" max="100" value="50" class="slider" id="myRange">
            </div>
        </aside>

        <main class="viewport" id="viewport">
            <canvas id="canvas"></canvas>
        </main>

        <aside class="panel panel-right">
            <h2>Info</h2>
            <p>Additional information can go here (render stats, controls, etc.).</p>
        </aside>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>

<style>
    html, body {
        height: 100%;
        margin: 0;
        overflow: hidden; /* keep the viewport always visible and avoid page scroll */
        background: #1e1e2e;
        font-family: Arial, sans-serif;
        color: #eee;
    }

    .app {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        grid-template-rows: 1fr;
        height: 100vh;
        gap: 12px;
        padding: 12px;
        box-sizing: border-box;
    }

    /* Allow grid children (panels/viewport) to shrink within the 100vh container */
    .app > * {
        min-height: 0;
    }

    .panel {
        background: rgba(40, 40, 50, 0.9);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 10px 35px rgba(0,0,0,0.4);
        overflow: auto;
    }

    .panel h2 {
        margin-top: 0;
        font-size: 1.1rem;
    }

    .control-group {
        margin-bottom: 14px;
    }

    .control-group label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 6px;
    }

    .viewport {
        position: relative;
        aspect-ratio: 1 / 1;
        max-width: 100%;
        max-height: 100%;
        border-radius: 12px;
        overflow: hidden;
        background: #0b0b0e;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .viewport canvas {
        width: 100%;
        height: 100%;
        display: pixelated; 
    }
</style>
