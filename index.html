<!DOCTYPE html>
<html>

<head>
    <title>RayTracingwhooohu</title>
</head>

<body>
    <canvas id="canvas" width="500" height="500"></canvas>
    <script type="module" src="./js/main.js"></script>

    <div class = "wrapper">
        <div class = "box1"> This box is here, i guess</div>

        <div class="slidecontainer">
            <input type="range" min="1" max="100" value="50" class="slider" id="myRange">
            <p>Value: <span id="demo"></span></p>
        </div>

        <div>
            <label>
                <input type="checkbox" id="pathTracingToggle"> Enable Path Tracing
            </label>
        </div>

        <div>
            <label for="bouncesSlider">Max Bounces: <span id="bouncesValue">10</span></label>
            <input type="range" min="1" max="20" value="10" id="bouncesSlider">
        </div>
    </div>
</body>
</html>

<style>
    html, body {
        height: 100%;
        background: #1e1e2e;
        margin: 0;
    }
    canvas {
        width: 50%;
        height: 100%;
        display: block;
        margin: 0px;
        offset: 10px;
    }
    .wrapper
    {
        position: absolute;
        top: 10px;
        left: 10px;
        background-color: rgba(122, 122, 122, 255);
        padding: 15px;
        border-radius: 5px;
        font-family: Arial, sans-serif;
        opacity: 1.0;
    }
</style>
